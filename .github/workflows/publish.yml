name: publish

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
          registry-url: "https://registry.npmjs.org"
          scope: "@akoenig"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install dependencies
        run: vp install

      - name: Check
        run: vp check --no-fmt

      - name: Test
        run: vp test

      - name: Set release version
        run: pnpm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --no-git-checks

      - name: Build
        run: vp run build

      - name: Publish to npm
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
